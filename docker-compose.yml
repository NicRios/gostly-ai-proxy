# Gostly AI — Self-hosted proxy
#
# Prerequisites:
#   1. Sign up at https://gostly.ai and grab your license key + registry token
#   2. Authenticate with the Gostly registry:
#        docker login -u AWS -p <your-registry-token> 242201285974.dkr.ecr.us-east-1.amazonaws.com
#   3. Copy .env.example to .env and fill in GOSTLY_LICENSE_KEY and BACKEND_URL
#   4. Run: docker compose up

services:

  ghost-postgres:
    image: postgres:16-alpine
    container_name: ghost-postgres
    environment:
      POSTGRES_USER:     ${POSTGRES_USER:-ghost}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in .env}
      POSTGRES_DB:       ${POSTGRES_DB:-ghost}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ghost} -d ${POSTGRES_DB:-ghost}"]
      interval: 10s
      timeout: 5s
      retries: 5

  ghost-web:
    image: 242201285974.dkr.ecr.us-east-1.amazonaws.com/gostlyai/web:latest
    container_name: ghost-web
    ports:
      - "3000:3000"
      - "8000:8000"
    environment:
      GOSTLY_LICENSE_KEY:   ${GOSTLY_LICENSE_KEY:?GOSTLY_LICENSE_KEY must be set in .env}
      AGENT_URL:            http://ghost-proxy:8080
      INFERENCE_URL:        http://ghost-inference:5000
      API_BASE_URL:         http://ghost-web:8000
      MOCK_DIR:             /data/mocks
      TRAFFIC_LOG_DIR:      /data/traffic
      ALLOWED_ORIGINS:      ${ALLOWED_ORIGINS:-http://localhost:3000}
      OPENAI_API_KEY:       ${OPENAI_API_KEY:-}
      DATABASE_URL:         ${DATABASE_URL:-postgresql://${POSTGRES_USER:-ghost}:${POSTGRES_PASSWORD}@ghost-postgres:5432/${POSTGRES_DB:-ghost}}
    volumes:
      - ./data:/data
    depends_on:
      ghost-postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health').read()"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s

  ghost-inference:
    image: 242201285974.dkr.ecr.us-east-1.amazonaws.com/gostlyai/inference:latest
    container_name: ghost-inference
    environment:
      MOCK_DIR:             /data/mocks
      FAISS_INDEX_PATH:     /data/faiss.index
      FAISS_MAP_PATH:       /data/faiss_id_map.json
      ENABLE_GENERATION:    ${ENABLE_GENERATION:-false}
      ENABLE_RAG:           ${ENABLE_RAG:-false}
      API_BASE_URL:         http://ghost-web:8000
      OMP_NUM_THREADS:      ${INFERENCE_NUM_THREADS:-4}
      MKL_NUM_THREADS:      ${INFERENCE_NUM_THREADS:-4}
      OPENBLAS_NUM_THREADS: ${INFERENCE_NUM_THREADS:-4}
    volumes:
      - ./data:/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health').read()"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          cpus: "${INFERENCE_CPU_LIMIT:-4}"
          memory: 6G

  ghost-proxy:
    image: 242201285974.dkr.ecr.us-east-1.amazonaws.com/gostlyai/proxy:latest
    container_name: ghost-proxy
    ports:
      - "8080:8080"
    environment:
      GOSTLY_LICENSE_KEY:      ${GOSTLY_LICENSE_KEY:?GOSTLY_LICENSE_KEY must be set in .env}
      BACKEND_URL:             ${BACKEND_URL:?BACKEND_URL must be set in .env}
      INITIAL_MODE:            ${INITIAL_MODE:-LEARN}
      PROXY_PORT:              "8080"
      MOCK_DIR:                /data/mocks
      SEQUENCE_FILE_PATH:      /data/sequences.jsonl
      MODE_FILE_PATH:          /data/mode.txt
      INFERENCE_URL:           http://ghost-inference:5000
      AI_CONFIDENCE_THRESHOLD: ${AI_CONFIDENCE_THRESHOLD:-0.70}
      ACCEPT_INVALID_CERTS:    ${ACCEPT_INVALID_CERTS:-false}
      REDACT_HEADERS:          ${REDACT_HEADERS:-Authorization,Cookie,X-Api-Key}
      API_URL:                 http://ghost-web:8000
      TRAFFIC_LOG_DIR:         /data/traffic
    volumes:
      - ./data:/data
    depends_on:
      ghost-web:
        condition: service_healthy
      ghost-inference:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres-data:
